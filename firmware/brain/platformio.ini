; Console BRAIN board firmware — hand-authored PlatformIO project (see the note in
; firmware/screen/platformio.ini for why not `atech build`). Board/env/pins match
; the generated old-pong controller build; the logic is the console_os stack + the
; 10 games. The rotary_encoder + speaker drivers are vendored under lib/ (copied
; from the atech catalog) so the firmware builds reproducibly without a live venv.
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; Raise the C++ standard (arduino core here defaults to gnu++11; console = C++14).
build_unflags = -std=gnu++11
; deep+ so the LDF follows the conditional `#include <Preferences.h>` (NVS store)
; behind -DCONSOLE_OS_NVS and pulls the framework Preferences library.
lib_ldf_mode = deep+
monitor_speed = 115200
upload_speed = 460800
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONSOLE_OS_NVS                       ; enable NvsSettingsStore (Preferences)
    -std=gnu++17
    -I${PROJECT_DIR}/../../include
    -I${PROJECT_DIR}/../../include/console   ; themes.cpp uses bare "themes.h"
    -I${PROJECT_DIR}/../../modules/console_os
    -I${PROJECT_DIR}/../../modules/link
    -I${PROJECT_DIR}/../../modules/pong_screen
    -I${PROJECT_DIR}/../../games/_sdk
    -I${PROJECT_DIR}/../../games/eggcatch
    -I${PROJECT_DIR}/../../games/snake
    -I${PROJECT_DIR}/../../games/pong
    -I${PROJECT_DIR}/../../games/racing
    -I${PROJECT_DIR}/../../games/flappy
    -I${PROJECT_DIR}/../../games/doodlejump
    -I${PROJECT_DIR}/../../games/invaders
    -I${PROJECT_DIR}/../../games/jukebox
    -I${PROJECT_DIR}/../../games/ambient
    -I${PROJECT_DIR}/../../games/demo
lib_deps =
    adafruit/Adafruit NeoPixel
    Preferences                            ; framework-bundled (NVS); force the LDF
