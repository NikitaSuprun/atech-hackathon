; Console SCREEN board firmware — hand-authored PlatformIO project.
;
; Why not `atech build`? The console's C++ spans modules and uses the
; `#include "console/..."` subdir convention; atech's codegen copies module files
; FLAT into build/lib and can't express cross-module include paths or compiler
; flags. A direct PlatformIO project gives the include layout + (later) size flags
; the platform needs. Board/env/pins/tile-order match the generated old-pong
; screen build exactly; only the logic (screen_render stack) differs.
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; The console contracts are C++14 (multi-statement constexpr, etc.); the arduino
; core here defaults to gnu++11, so raise the standard for the whole build.
build_unflags = -std=gnu++11
monitor_speed = 115200
; 460800 (not 921600) + explicit reset flags = reliable flashing over ESP32-S3
; native USB-CDC (otherwise it often hangs at "Connecting...").
upload_speed = 460800
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -I${PROJECT_DIR}/../../include
    -I${PROJECT_DIR}/../../modules/screen_render
    -I${PROJECT_DIR}/../../modules/link
    -I${PROJECT_DIR}/../../modules/pong_screen
lib_deps =
    adafruit/Adafruit NeoPixel
