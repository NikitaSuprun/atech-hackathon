name: CI

on:
  push:
  pull_request:

jobs:
  host-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # g++ and make are preinstalled on ubuntu-latest.
      - name: Run host CI suite
        run: bash tools/ci.sh --host-only
